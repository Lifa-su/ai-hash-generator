<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hash Generator - MD5/SHA-1/SHA-256/SHA-512</title>
<meta name="description" content="Free online hash generator. Generate MD5, SHA-1, SHA-256, SHA-512 hashes from text or files. Compare and verify hash values instantly.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eee;--text2:#aaa;--green:#00c853;--red:#ff5252;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:800px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:1.8rem;margin:20px 0 8px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:28px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:12px;border:none;border-radius:var(--radius);background:var(--surface);color:var(--text2);font-size:.95rem;cursor:pointer;transition:.2s}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){background:var(--surface2)}
.panel{display:none}.panel.active{display:block}
textarea{width:100%;min-height:120px;padding:14px;border:2px solid var(--surface2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:.95rem;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.drop-zone{border:2px dashed var(--surface2);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;background:var(--surface)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--surface2)}
.drop-zone svg{width:48px;height:48px;fill:var(--text2);margin-bottom:12px}
.drop-zone p{color:var(--text2);font-size:.95rem}
.drop-zone .filename{color:var(--accent);font-weight:600;margin-top:8px;word-break:break-all}
#fileInput{display:none}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .2s}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{margin-top:12px;display:none}
.progress-bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s}
.progress-text{font-size:.8rem;color:var(--text2);margin-top:4px;text-align:right}
.results{margin-top:24px}
.result-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative}
.result-card .algo{font-size:.8rem;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:6px}
.result-card .hash{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.85rem;word-break:break-all;color:var(--text);user-select:all;padding-right:40px}
.copy-btn{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--text2);font-size:.75rem;transition:.2s}
.copy-btn:hover{background:var(--accent);color:#fff}
.copy-btn.copied{background:var(--green);color:#fff}
.verify-section{margin-top:20px}
.verify-section label{font-size:.9rem;color:var(--text2);display:block;margin-bottom:6px}
.verify-input{width:100%;padding:12px;border:2px solid var(--surface2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.85rem;outline:none;transition:border-color .2s}
.verify-input:focus{border-color:var(--accent)}
.match-status{margin-top:8px;padding:10px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:600;display:none}
.match-status.match{display:block;background:rgba(0,200,83,.15);color:var(--green);border:1px solid rgba(0,200,83,.3)}
.match-status.no-match{display:block;background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.3)}
footer{text-align:center;color:var(--text2);font-size:.8rem;margin-top:40px;padding-bottom:20px}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.container{padding:14px}h1{font-size:1.4rem}.tab{padding:10px 6px;font-size:.85rem}textarea{min-height:100px}}
</style>
</head>
<body>
<div class="container">
  <h1>&#128274; AI Hash Generator</h1>
  <p class="subtitle">Generate &amp; verify MD5 &middot; SHA-1 &middot; SHA-256 &middot; SHA-512 hashes</p>
  <div class="tabs">
    <button class="tab active" data-tab="text">&#128221; Text Input</button>
    <button class="tab" data-tab="file">&#128193; File Upload</button>
  </div>
  <div id="textPanel" class="panel active">
    <textarea id="textInput" placeholder="Enter text to hash..." aria-label="Text input for hashing"></textarea>
    <button class="btn" id="hashTextBtn">Generate Hashes</button>
  </div>
  <div id="filePanel" class="panel">
    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Click or drag file to upload">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
      <p>Click or drag a file here</p>
      <div class="filename" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" aria-hidden="true">
    <button class="btn" id="hashFileBtn" disabled>Generate Hashes</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>
  <div class="results" id="results"></div>
  <div class="verify-section" id="verifySection" style="display:none">
    <label for="verifyInput">&#128269; Paste expected hash to verify:</label>
    <input type="text" class="verify-input" id="verifyInput" placeholder="Paste hash to compare..." aria-label="Expected hash for verification">
    <div class="match-status" id="matchStatus"></div>
  </div>
</div>
<footer>
  <p>Built with Web Crypto API &amp; JavaScript &middot; No data leaves your browser</p>
</footer>
<script>
// MD5 pure JS implementation
const MD5=function(){function h(a,b){var c,d,e,f,g;e=a&2147483648;f=b&2147483648;c=a&1073741824;d=b&1073741824;g=(a&1073741823)+(b&1073741823);return c&d?g^2147483648^e^f:c|d?g&1073741824?g^3221225472^e^f:g^1073741824^e^f:g^e^f}function k(a,b,c,d,e,f,g){a=h(a,h(h(b&c|~b&d,e),g));return h(a<<f|a>>>32-f,b)}function l(a,b,c,d,e,f,g){a=h(a,h(h(b&d|c&~d,e),g));return h(a<<f|a>>>32-f,b)}function m(a,b,c,d,e,f,g){a=h(a,h(h(b^c^d,e),g));return h(a<<f|a>>>32-f,b)}function n(a,b,c,d,e,f,g){a=h(a,h(h(c^(b|~d),e),g));return h(a<<f|a>>>32-f,b)}function p(a){var b="",c,d;for(d=0;d<=3;d++)c=a>>>d*8&255,b+="0123456789abcdef".charAt(c>>>4&15)+"0123456789abcdef".charAt(c&15);return b}var q=function(a){var b=a.length,c=b+8,d=(c-c%64)/64,e=(d+1)*16,f=Array(e-1),g=0,i=0;while(i<b){var j=(i-i%4)/4;g=i%4*8;f[j]=f[j]|a.charCodeAt(i)<<g;i++}f[(i-i%4)/4]|=128<<i%4*8;f[e-2]=b<<3;f[e-1]=b>>>29;return f};return{hash:function(a){var x=q(a),b=1732584193,c=4023233417,d=2562383102,e=271733878,f;for(f=0;f<x.length;f+=16){var g=b,i=c,j=d,o=e;b=k(b,c,d,e,x[f],7,3614090360);e=k(e,b,c,d,x[f+1],12,3905402710);d=k(d,e,b,c,x[f+2],17,606105819);c=k(c,d,e,b,x[f+3],22,3250441966);b=k(b,c,d,e,x[f+4],7,4118548399);e=k(e,b,c,d,x[f+5],12,1200080426);d=k(d,e,b,c,x[f+6],17,2821735955);c=k(c,d,e,b,x[f+7],22,4249261313);b=k(b,c,d,e,x[f+8],7,1770035416);e=k(e,b,c,d,x[f+9],12,2336552879);d=k(d,e,b,c,x[f+10],17,4294925233);c=k(c,d,e,b,x[f+11],22,2304563134);b=k(b,c,d,e,x[f+12],7,1804603682);e=k(e,b,c,d,x[f+13],12,4254626195);d=k(d,e,b,c,x[f+14],17,2792965006);c=k(c,d,e,b,x[f+15],22,1236535329);b=l(b,c,d,e,x[f+1],5,4129170786);e=l(e,b,c,d,x[f+6],9,3225465664);d=l(d,e,b,c,x[f+11],14,643717713);c=l(c,d,e,b,x[f],20,3921069994);b=l(b,c,d,e,x[f+5],5,3593408605);e=l(e,b,c,d,x[f+10],9,38016083);d=l(d,e,b,c,x[f+15],14,3634488961);c=l(c,d,e,b,x[f+4],20,3889429448);b=l(b,c,d,e,x[f+9],5,568446438);e=l(e,b,c,d,x[f+14],9,3275163606);d=l(d,e,b,c,x[f+3],14,4107603335);c=l(c,d,e,b,x[f+8],20,1163531501);b=l(b,c,d,e,x[f+13],5,2850285829);e=l(e,b,c,d,x[f+2],9,4243563512);d=l(d,e,b,c,x[f+7],14,1735328473);c=l(c,d,e,b,x[f+12],20,2368359562);b=m(b,c,d,e,x[f+5],4,4294588738);e=m(e,b,c,d,x[f+8],11,2272392833);d=m(d,e,b,c,x[f+11],16,1839030562);c=m(c,d,e,b,x[f+14],23,4259657740);b=m(b,c,d,e,x[f+1],4,2763975236);e=m(e,b,c,d,x[f+4],11,1272893353);d=m(d,e,b,c,x[f+7],16,4139469664);c=m(c,d,e,b,x[f+10],23,3200236656);b=m(b,c,d,e,x[f+13],4,681279174);e=m(e,b,c,d,x[f],11,3936430074);d=m(d,e,b,c,x[f+3],16,3572445317);c=m(c,d,e,b,x[f+6],23,76029189);b=m(b,c,d,e,x[f+9],4,3654602809);e=m(e,b,c,d,x[f+12],11,3873151461);d=m(d,e,b,c,x[f+15],16,530742520);c=m(c,d,e,b,x[f+2],23,3299628645);b=n(b,c,d,e,x[f],6,4096336452);e=n(e,b,c,d,x[f+7],10,1126891415);d=n(d,e,b,c,x[f+14],15,2878612391);c=n(c,d,e,b,x[f+5],21,4237533241);b=n(b,c,d,e,x[f+12],6,1700485571);e=n(e,b,c,d,x[f+3],10,2399980690);d=n(d,e,b,c,x[f+10],15,4293915773);c=n(c,d,e,b,x[f+1],21,2240044497);b=n(b,c,d,e,x[f+8],6,1873313359);e=n(e,b,c,d,x[f+15],10,4264355552);d=n(d,e,b,c,x[f+6],15,2734768916);c=n(c,d,e,b,x[f+13],21,1309151649);b=n(b,c,d,e,x[f+4],6,4149444226);e=n(e,b,c,d,x[f+11],10,3174756917);d=n(d,e,b,c,x[f+2],15,718787259);c=n(c,d,e,b,x[f+9],21,3951481745);b=h(b,g);c=h(c,i);d=h(d,j);e=h(e,o)}return(p(b)+p(c)+p(d)+p(e)).toLowerCase()}};}();

// MD5 for ArrayBuffer (file hashing)
function md5ArrayBuffer(buffer){
  var bytes=new Uint8Array(buffer);
  var str='';
  for(var i=0;i<bytes.length;i++)str+=String.fromCharCode(bytes[i]);
  return MD5.hash(str);
}

// Incremental MD5 for large files
function createMD5Incremental(){
  var chunks=[];
  return{
    update:function(ab){chunks.push(new Uint8Array(ab));},
    digest:function(){
      var total=0;chunks.forEach(function(c){total+=c.length;});
      var merged=new Uint8Array(total);var off=0;
      chunks.forEach(function(c){merged.set(c,off);off+=c.length;});
      var str='';for(var i=0;i<merged.length;i++)str+=String.fromCharCode(merged[i]);
      return MD5.hash(str);
    }
  };
}

function bufToHex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}

async function hashText(text){
  var enc=new TextEncoder();var data=enc.encode(text);
  var results={};
  results['MD5']=MD5.hash(text);
  var sha1=await crypto.subtle.digest('SHA-1',data);results['SHA-1']=bufToHex(sha1);
  var sha256=await crypto.subtle.digest('SHA-256',data);results['SHA-256']=bufToHex(sha256);
  var sha512=await crypto.subtle.digest('SHA-512',data);results['SHA-512']=bufToHex(sha512);
  return results;
}

async function hashFile(file,onProgress){
  var CHUNK=2*1024*1024;
  var algos=['SHA-1','SHA-256','SHA-512'];
  var md5inc=createMD5Incremental();
  var offset=0;var size=file.size;
  // For Web Crypto we need full buffer for each algo, but for large files we stream
  // Web Crypto doesn't support streaming, so we collect all chunks then digest
  // But for very large files this uses memory. Alternative: use SubtleCrypto with incremental not supported.
  // We'll read in chunks for progress, accumulate, then digest at end.
  var allChunks=[];
  while(offset<size){
    var slice=file.slice(offset,offset+CHUNK);
    var ab=await slice.arrayBuffer();
    allChunks.push(ab);
    md5inc.update(ab);
    offset+=CHUNK;
    if(onProgress)onProgress(Math.min(offset/size,1));
  }
  // Merge for Web Crypto
  var total=0;allChunks.forEach(function(c){total+=c.byteLength;});
  var merged=new Uint8Array(total);var off=0;
  allChunks.forEach(function(c){merged.set(new Uint8Array(c),off);off+=c.byteLength;});
  var results={};
  results['MD5']=md5inc.digest();
  for(var i=0;i<algos.length;i++){
    var h=await crypto.subtle.digest(algos[i],merged.buffer);
    results[algos[i]]=bufToHex(h);
  }
  return results;
}

// UI
var currentHashes=null;
var tabs=document.querySelectorAll('.tab');
var panels={text:document.getElementById('textPanel'),file:document.getElementById('filePanel')};
tabs.forEach(function(t){t.addEventListener('click',function(){
  tabs.forEach(function(x){x.classList.remove('active');});
  t.classList.add('active');
  Object.values(panels).forEach(function(p){p.classList.remove('active');});
  panels[t.dataset.tab].classList.add('active');
});});

// Text hashing
document.getElementById('hashTextBtn').addEventListener('click',async function(){
  var text=document.getElementById('textInput').value;
  if(!text){alert('Please enter some text.');return;}
  this.disabled=true;this.textContent='Generating...';
  try{
    var r=await hashText(text);
    currentHashes=r;showResults(r);
  }catch(e){alert('Error: '+e.message);}
  this.disabled=false;this.textContent='Generate Hashes';
});

// File handling
var dropZone=document.getElementById('dropZone');
var fileInput=document.getElementById('fileInput');
var selectedFile=null;

dropZone.addEventListener('click',function(){fileInput.click();});
dropZone.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')fileInput.click();});
dropZone.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('dragover');});
dropZone.addEventListener('dragleave',function(){this.classList.remove('dragover');});
dropZone.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('dragover');if(e.dataTransfer.files.length)selectFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',function(){if(this.files.length)selectFile(this.files[0]);});

function selectFile(f){
  selectedFile=f;
  document.getElementById('fileName').textContent=f.name+' ('+formatSize(f.size)+')';
  document.getElementById('hashFileBtn').disabled=false;
}
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB';}

document.getElementById('hashFileBtn').addEventListener('click',async function(){
  if(!selectedFile)return;
  this.disabled=true;this.textContent='Generating...';
  var pw=document.getElementById('progressWrap');pw.style.display='block';
  var pf=document.getElementById('progressFill');var pt=document.getElementById('progressText');
  try{
    var r=await hashFile(selectedFile,function(p){
      var pct=Math.round(p*100);
      pf.style.width=pct+'%';pt.textContent=pct+'%';
    });
    currentHashes=r;showResults(r);
  }catch(e){alert('Error: '+e.message);}
  this.disabled=false;this.textContent='Generate Hashes';
});

function showResults(hashes){
  var container=document.getElementById('results');
  container.innerHTML='';
  var algos=['MD5','SHA-1','SHA-256','SHA-512'];
  algos.forEach(function(algo){
    var card=document.createElement('div');card.className='result-card';
    card.innerHTML='<div class="algo">'+algo+'</div><div class="hash">'+hashes[algo]+'</div><button class="copy-btn" aria-label="Copy '+algo+' hash">Copy</button>';
    card.querySelector('.copy-btn').addEventListener('click',function(){
      navigator.clipboard.writeText(hashes[algo]).then(function(){
        var btn=card.querySelector('.copy-btn');btn.textContent='Copied!';btn.classList.add('copied');
        setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},1500);
      });
    });
    container.appendChild(card);
  });
  document.getElementById('verifySection').style.display='block';
  document.getElementById('verifyInput').value='';
  document.getElementById('matchStatus').className='match-status';
  document.getElementById('matchStatus').style.display='none';
}

// Verify
document.getElementById('verifyInput').addEventListener('input',function(){
  var expected=this.value.trim().toLowerCase();
  var status=document.getElementById('matchStatus');
  if(!expected||!currentHashes){status.style.display='none';return;}
  var matched=null;
  Object.keys(currentHashes).forEach(function(algo){
    if(currentHashes[algo]===expected)matched=algo;
  });
  if(matched){
    status.className='match-status match';
    status.innerHTML='&#10004; Match found! Matches '+matched+' hash.';
    status.style.display='block';
  }else{
    status.className='match-status no-match';
    status.innerHTML='&#10008; No match found. The hash does not match any generated value.';
    status.style.display='block';
  }
});
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
